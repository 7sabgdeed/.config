theme = "tokyonight"

[editor]
line-number = "relative"
# mouse = false
continue-comments = false

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[keys.normal]

d = "delete_selection_noyank"
c = "change_selection_noyank"

"A-d" = "delete_selection"
"A-c" = "change_selection"
